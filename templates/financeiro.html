<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#facc15">

<link rel="icon" href="/static/favicon.jpg">
<link rel="apple-touch-icon" href="/static/icon-192.jpg">
<link rel="stylesheet" href="/static/responsive.css">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"));
}
</script>

<style>
.stat-card {
    text-align: center;
}

.stat-card p {
    margin: 0 0 10px;
    color: #9ca3af;
}

.valor {
    font-size: clamp(2rem, 6vw, 2.8rem);
    color: #22c55e;
    font-weight: bold;
}
</style>
</head>

<body class="responsive-page">

<div class="page-shell page-shell--medium">
    <div class="page-header">
        <div class="brand-block">
            <img src="/static/logo.jpg" class="brand-avatar">
            <div>
                <p class="brand-kicker">Wagen Estetica</p>
            <h1 class="page-title">Financeiro do Dia</h1>
            <p class="page-subtitle">Resumo adaptado para consulta rapida em celular, tablet e desktop.</p>
            </div>
        </div>
        <a href="/" class="button-link">
            <button type="button">Voltar</button>
        </a>
    </div>

    <div class="page-grid">
        <div class="page-card stat-card">
            <p class="pill-label">Total faturado</p>
            <div class="valor metric-value metric-value--success">R$ {{total}}</div>
        </div>

        <div class="page-card stat-card">
            <p class="pill-label">Servicos realizados</p>
            <div class="valor metric-value">{{quantidade}}</div>
        </div>

        <div class="page-card stat-card">
            <p class="pill-label">Ticket medio</p>
            <div class="valor metric-value">R$ {{ticket}}</div>
        </div>
    </div>
</div>

</body>
</html>
