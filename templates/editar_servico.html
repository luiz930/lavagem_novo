<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Servico | {{ site_title }}</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="{{ brand_primary_color }}">

<link rel="icon" href="{{ brand_favicon_url or '/static/favicon.jpg' }}">
<link rel="apple-touch-icon" href="{{ brand_favicon_url or '/static/icon-192.jpg' }}">
<link rel="stylesheet" href="/static/responsive.css">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .catch(() => {});
}
</script>

<style>
</style>
</head>

<body class="responsive-page">

<div class="page-shell page-shell--narrow">
    <div class="page-header">
        <div class="brand-block">
            <img src="{{ brand_logo_url or '/static/logo.jpg' }}" class="brand-avatar" alt="{{ brand_name }}">
            <div>
                <p class="brand-kicker">{{ brand_subtitle }}</p>
                <h1 class="page-title">Editar Servico</h1>
                <p class="page-subtitle">Ajuste nome e valor com conforto em qualquer tamanho de tela.</p>
            </div>
        </div>
        <a href="/cadastrar_servico" class="button-link">
            <button type="button">Voltar</button>
        </a>
    </div>

    <div class="page-card">
        <form method="POST" class="stack-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <input name="nome" value="{{servico[1]}}" required>
            <input name="valor" value="{{servico[2]}}" required>
            <button>Salvar Alteracoes</button>
        </form>
    </div>
</div>

<footer class="site-footer">
    {{ site_footer_text }} | {{ app_version }}
</footer>

</body>
</html>
