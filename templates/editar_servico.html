<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Servico</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#facc15">

<link rel="icon" href="/static/favicon.jpg">
<link rel="apple-touch-icon" href="/static/icon-192.jpg">
<link rel="stylesheet" href="/static/responsive.css">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"));
}
</script>

<style>
</style>
</head>

<body class="responsive-page">

<div class="page-shell page-shell--narrow">
    <div class="page-header">
        <div class="brand-block">
            <img src="/static/logo.jpg" class="brand-avatar">
            <div>
                <p class="brand-kicker">Wagen Estetica</p>
            <h1 class="page-title">Editar Servico</h1>
            <p class="page-subtitle">Ajuste nome e valor com conforto em qualquer tamanho de tela.</p>
            </div>
        </div>
        <a href="/cadastro_servico" class="button-link">
            <button type="button">Voltar</button>
        </a>
    </div>

    <div class="page-card">
        <form method="POST" class="stack-form">
            <input name="nome" value="{{servico[1]}}" required>
            <input name="valor" value="{{servico[2]}}" required>
            <button>Salvar Alteracoes</button>
        </form>
    </div>
</div>

<footer class="site-footer">
    Desenvolvido por Luiz Henrique | Wagen Estetica Automotiva | {{ app_version }} | Direitos Reservados.
</footer>

{% if session.get("usuario") %}
<script src="/static/operacional_voz.js"></script>
{% endif %}

</body>
</html>
