<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos de Pneu</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#facc15">

<link rel="icon" href="/static/favicon.jpg">
<link rel="apple-touch-icon" href="/static/icon-192.jpg">
<link rel="stylesheet" href="/static/responsive.css">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"));
}
</script>

<style>
.card {
    width: 100%;
}

.card p {
    margin: 0;
}
</style>
</head>

<body class="responsive-page">

<div class="page-shell page-shell--narrow">
    <div class="page-header">
        <div class="brand-block">
            <img src="/static/logo.jpg" class="brand-avatar">
            <div>
                <p class="brand-kicker">Wagen Estetica</p>
            <h1 class="page-title">Produtos de Pneu</h1>
            <p class="page-subtitle">Cadastro simples e legivel em qualquer tamanho de tela.</p>
            </div>
        </div>
        <a href="/" class="button-link">
            <button type="button">Voltar</button>
        </a>
    </div>

    <div class="page-card">
        <form method="POST" class="stack-form">
            <input name="nome" placeholder="Ex: Selante, Darker">
            <button>Salvar</button>
        </form>
    </div>

    <div class="top-spacing">
        <h2 class="section-title muted-text">Cadastrados</h2>
        <div class="list-grid">
            {% for p in produtos %}
            <div class="page-card card">
                <p>{{p[1]}}</p>
            </div>
            {% else %}
            <div class="page-card">
                <p class="muted-text">Nenhum produto cadastrado ainda.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
