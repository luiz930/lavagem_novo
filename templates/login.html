<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#facc15">

<link rel="icon" href="/static/favicon.jpg">
<link rel="apple-touch-icon" href="/static/icon-192.jpg">
<link rel="stylesheet" href="/static/responsive.css">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"));
}
</script>

<style>
.login-card {
    max-width: 460px;
    margin: 8vh auto 0;
}

.erro {
    color: #fca5a5;
    margin: 0;
}
</style>
</head>

<body class="responsive-page">

<div class="page-shell page-shell--narrow">
    <div class="page-card login-card">
        <div class="page-header page-header--center">
            <div class="brand-block brand-block--center">
                <img src="/static/logo.jpg" class="brand-avatar">
                <div>
                    <p class="brand-kicker">Wagen Estetica</p>
                <h1 class="page-title">Acesso Wagen</h1>
                <p class="page-subtitle">Entre pelo celular, tablet ou desktop com a mesma experiencia.</p>
                </div>
            </div>
        </div>

        <form method="POST" class="stack-form">
            <input name="usuario" placeholder="Usuario" autocomplete="username">
            <input name="senha" type="password" placeholder="Senha" autocomplete="current-password">
            <button>Entrar</button>
        </form>

        {% if erro %}
        <div class="page-card top-spacing">
            <p class="erro">{{erro}}</p>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
