<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Painel Operacional</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#facc15">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"));
}
</script>

<style>

/* RESPONSIVO SIMPLES */
* {
    box-sizing: border-box;
}

input, select, button {
    width: 100%;
    max-width: 400px;
    font-size: 16px;
}

.card {
    width: 95%;
    max-width: 400px;
    margin: 10px auto;
}

.topo {
    border: 2px solid #22c55e;
    box-shadow: 0 0 20px rgba(34,197,94,0.4);
}

/* FLEX ADAPTÁVEL */
.flex {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

/* MOBILE */
@media (max-width: 600px) {
    h1 {
        font-size: 20px;
    }

    button {
        padding: 12px;
    }
}

body { 
    background:#0b0b0b; 
    color:white; 
    font-family:Arial; 
    text-align:center; 
}

/* HEADER */
.topo {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    padding:15px;
}

/* LOGO */
.logo {
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

/* BOTÃO VOLTAR */
.voltar {
    position:absolute;
    left:20px;
    top:20px;
}

/* CARDS */
.card {
    background:#111827;
    margin:15px auto;
    padding:20px;
    border-radius:10px;
    border:1px solid #facc15;

    width:95%;
    max-width:520px; /* 🔥 aumenta o espaço */
}

/* PLACA */
.placa {
    font-size:22px;
    font-weight:bold;
    color:#facc15;
}

/* STATUS */
.status {
    color:#facc15;
    font-weight:bold;
}

/* BOTÕES */
button {
    padding:10px;
    border:none;
    border-radius:6px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#eab308;
}

.status.andamento {
    color: #facc15;
}

.status.finalizado {
    color: #22c55e;
}

.atrasado {
    border: 2px solid #ef4444 !important;
    box-shadow: 0 0 15px rgba(239,68,68,0.5);
}

.acoes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
}

.btn.small {
    width: 60px;
    height: 40px;
    font-size: 18px;
}

.card p {
    margin: 5px 0;
}

.card {
    transition: 0.3s;
}

.card:active {
    transform: scale(0.98);
}

/* MOBILE PROFISSIONAL */
@media (max-width: 600px) {

    .card {
        padding: 15px;
        border-radius: 12px;
    }

    .placa {
        font-size: 26px;
    }

    button {
        width: 100%;
        font-size: 16px;
        padding: 14px;
    }

    input[type="file"] {
        font-size: 16px;
        padding: 10px;
        background: #1f2937;
        color: white;
        border-radius: 6px;
    }

}

</style>

</head>

<body>

<!-- BOTÃO VOLTAR -->
<div class="voltar">
<a href="/">
<button>🔙 Voltar</button>
</a>
</div>

<!-- TOPO -->
<div class="topo">
<img src="/static/logo.jpg" class="logo">
<h1 style="color:#facc15;">Painel Operacional</h1>
</div>

<!-- SERVIÇOS -->
{% for s in servicos %}
<div class="card {% if loop.index == 1 %}topo{% endif %}">
<p><b>Prioridade:</b> {{s[14]}}</p>

<div class="acoes">
    <a href="/prioridade/{{s[0]}}/up">
        <button class="btn small">⬆️</button>
    </a>

    <a href="/prioridade/{{s[0]}}/down">
        <button class="btn small">⬇️</button>
    </a>
</div>

<p style="color:#9ca3af;">Fila: {{loop.index}}</p>
<div class="placa">{{s[1]}}</div>

<p><b>Cliente:</b> {{s[2]}}</p>
<p><b>Valor:</b> 💰 R${{s[3]}}</p>

<p class="status 
{% if s[13] == 'EM ANDAMENTO' %}andamento{% endif %}
{% if s[13] == 'FINALIZADO' %}finalizado{% endif %}
">
{{s[13]}}
</p>

<p>Entrada: {{s[4]}}</p>
<p>Entrega: {{s[5]}}</p>

{% if s[13] == "EM ANDAMENTO" %}

<form action="/detalhe/{{s[0]}}" method="POST" enctype="multipart/form-data">

    <input type="file" name="foto_detalhe" accept="image/*" multiple>

    <button type="submit">📸 Salvar</button>

</form>

{% endif %}

{% if s[13] == "EM ANDAMENTO" %}
<form action="/finalizar/{{s[0]}}" method="POST" enctype="multipart/form-data">
    <input type="file" name="foto_saida" accept="image/*" capture="environment" required>
    <button>Finalizar</button>
</form>
{% endif %}

</div>
{% endfor %}



<script>
function verificarAtraso() {
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const entradaText = card.innerText.match(/Entrada: (.+)/);

        if (!entradaText) return;

        try {
            const partes = entradaText[1].split(" ");
            const data = partes[0].split("/");
            const hora = partes[1].split(":");

            const entrada = new Date(
                data[2],
                data[1] - 1,
                data[0],
                hora[0],
                hora[1]
            );

            const agora = new Date();
            const diff = (agora - entrada) / 1000;

            if (diff > 3600) {
                card.classList.add("atrasado");
            }

        } catch (e) {}
    });
}

setInterval(verificarAtraso, 5000);
verificarAtraso();
</script>

</body>
</html>
