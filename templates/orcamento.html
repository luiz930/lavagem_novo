{% extends "base.html" %}

{% block title %}Orçamento{% endblock %}
{% block titulo %}Orçamento{% endblock %}
{% block subtitulo %}Gerar orçamento{% endblock %}

{% block actions %}
<a href="/" class="button-link">
    <button type="button">Voltar</button>
</a>
{% endblock %}

{% block content %}

<div class="page-card">

<form action="/gerar_orcamento" method="POST" class="stack-form stack-form--wide">

<input id="placa" name="placa" placeholder="Placa" onblur="buscarCliente()">
<input id="nome" name="nome" placeholder="Nome">
<input id="telefone" name="telefone" placeholder="Telefone">
<input id="modelo" name="modelo" placeholder="Modelo">

<h3>Serviços</h3>

<select id="selectServico">
<option value="">Selecione</option>
{% for s in servicos %}
<option value="{{s[0]}}" data-valor="{{s[1]}}">
{{s[0]}} - R${{s[1]}}
</option>
{% endfor %}
</select>

<button type="button" onclick="addServico()">Adicionar</button>

<hr>

<input id="manualNome" placeholder="Serviço manual">
<input id="manualValor" placeholder="Valor">

<button type="button" onclick="addManual()">Adicionar manual</button>

<hr>

<div id="lista"></div>

<h3 id="total">Total: R$ 0.00</h3>

<textarea name="observacoes" placeholder="Observações"></textarea>

<button type="submit">Gerar PDF</button>

</form>

</div>

{% endblock %}
