name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - "mobile/android/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:
    inputs:
      supabase_url:
        description: "URL do projeto Supabase"
        required: false
        default: ""
      supabase_anon_key:
        description: "Anon key publica do Supabase"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: mobile/android
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ github.event.inputs.supabase_anon_key || secrets.SUPABASE_ANON_KEY }}
        run: gradle :app:assembleDebug -PsupabaseUrl="$SUPABASE_URL" -PsupabaseAnonKey="$SUPABASE_ANON_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wagen-banco-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
