name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_base_url:
        description: "URL do servidor Flask que o APK deve abrir"
        required: false
        default: "https://wagenestetica.duckdns.org"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug -PappBaseUrl="${{ github.event.inputs.app_base_url || 'https://wagenestetica.duckdns.org' }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wagen-banco-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
